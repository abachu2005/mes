name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: System deps for WeasyPrint and MNE
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libcairo2 libgdk-pixbuf2.0-0 libffi-dev
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[backend,dev]"
      - name: Lint
        run: |
          ruff check mes_core backend tests
      - name: Type check
        run: |
          mypy mes_core backend || true  # non-blocking initially
      - name: Test
        run: |
          pytest --cov=mes_core --cov=backend --cov-report=xml --cov-report=term
      - name: Coverage gates
        run: |
          python -c "
          import xml.etree.ElementTree as ET
          t = ET.parse('coverage.xml').getroot()
          for pkg in t.iter('package'):
              name = pkg.get('name', '')
              rate = float(pkg.get('line-rate', 0)) * 100
              print(f'{name}: {rate:.1f}%')
          "

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test -- --run --passWithNoTests
      - name: Build
        run: npm run build

  deploy-space:
    needs: [python, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install hf hub
        run: pip install "huggingface_hub>=0.24"
      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python scripts/hf_deploy.py
