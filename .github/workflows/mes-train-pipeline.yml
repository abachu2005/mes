name: mes-train-pipeline

# Preprocess + Riemannian on GitHub Actions (Kaggle DNS blocks physionet.org).
# EEGNet runs separately via hf-jobs-train-eegnet after this succeeds.

on:
  workflow_dispatch:
    inputs:
      subjects:
        description: "Number of PhysioNet subjects (1-30)"
        required: false
        default: "30"
      smoke:
        description: "Run 1-subject smoke probe during preflight"
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - "scripts/gh_preprocess_physionet.py"
      - "scripts/gh_train_riemannian.py"
      - "scripts/hf_sync.py"
      - "scripts/preflight.py"
      - ".github/workflows/mes-train-pipeline.yml"
  workflow_run:
    workflows: [kaggle-chain]
    types: [completed]

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure')
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_USERNAME: ${{ secrets.HF_USERNAME }}
      HF_DATASET_REPO: ${{ secrets.HF_USERNAME }}/mes-eeg-processed
      HF_MODEL_REPO: ${{ secrets.HF_USERNAME }}/mes-models
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[train]"
          pip install skl2onnx 'huggingface_hub[cli]>=0.26'
      - name: Preflight (fail fast)
        run: |
          EXTRA=""
          if [ "${{ github.event.inputs.smoke }}" = "true" ]; then EXTRA="--smoke"; fi
          python scripts/preflight.py --stage mes-train $EXTRA

  train:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 180
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure')
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_USERNAME: ${{ secrets.HF_USERNAME }}
      HF_DATASET_REPO: ${{ secrets.HF_USERNAME }}/mes-eeg-processed
      HF_MODEL_REPO: ${{ secrets.HF_USERNAME }}/mes-models
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[train]"
          pip install skl2onnx

      - name: Check for existing processed parquet on HF
        id: hf_processed
        run: |
          python <<'PY'
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          files = api.list_repo_files(os.environ["HF_DATASET_REPO"], repo_type="dataset")
          n = sum(1 for f in files if f.startswith("processed/") and f.endswith(".parquet"))
          print(f"processed_parquet_count={n}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"count={n}\n")
              out.write(f"skip_preprocess={'true' if n >= 50 else 'false'}\n")
          PY

      - name: Preprocess PhysioNet → parquet
        if: steps.hf_processed.outputs.skip_preprocess != 'true'
        run: |
          python scripts/gh_preprocess_physionet.py \
            --out /tmp/mes-out/processed \
            --subjects "${{ github.event.inputs.subjects || '30' }}"

      - name: Download processed parquet from HF
        if: steps.hf_processed.outputs.skip_preprocess == 'true'
        run: |
          python <<'PY'
          import os
          from pathlib import Path
          from huggingface_hub import snapshot_download
          root = Path(snapshot_download(
              repo_id=os.environ["HF_DATASET_REPO"],
              repo_type="dataset",
              allow_patterns=["processed/*.parquet"],
              token=os.environ["HF_TOKEN"],
          ))
          dst = Path("/tmp/mes-out/processed")
          dst.mkdir(parents=True, exist_ok=True)
          src = root / "processed"
          for f in src.glob("*.parquet"):
              (dst / f.name).symlink_to(f)
          print(f"Linked {len(list(dst.glob('*.parquet')))} parquet files")
          PY

      - name: Upload processed data to HF
        if: steps.hf_processed.outputs.skip_preprocess != 'true'
        run: |
          python scripts/hf_sync.py \
            --local-dir /tmp/mes-out \
            --repo-id "$HF_DATASET_REPO" \
            --repo-type dataset \
            --subdir processed \
            --message "preprocess physionet via GitHub Actions"

      - name: Train Riemannian baseline
        run: |
          python scripts/gh_train_riemannian.py \
            --data /tmp/mes-out/processed \
            --out /tmp/mes-models

      - name: Upload models to HF
        run: |
          set -euo pipefail
          for pat in "*.onnx" "*.json" "*.npz"; do
            python scripts/hf_sync.py \
              --local-dir /tmp/mes-models \
              --repo-id "$HF_MODEL_REPO" \
              --repo-type model \
              --pattern "$pat" \
              --message "riemannian train via GitHub Actions"
          done

      - name: Done
        run: |
          echo "::notice::Dataset https://huggingface.co/datasets/${HF_DATASET_REPO}"
          echo "::notice::Models https://huggingface.co/${HF_MODEL_REPO}"
          echo "::notice::EEGNet will auto-start via hf-jobs-train-eegnet workflow"
