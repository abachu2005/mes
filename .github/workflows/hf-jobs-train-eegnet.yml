name: hf-jobs-train-eegnet

# Trains EEGNet on Hugging Face Jobs (A10G GPU, ~1–2 h, no Kaggle queue).
# Requires HF Pro + credits. Needs mes-eeg-processed on HF Hub first.

on:
  workflow_dispatch:
    inputs:
      flavor:
        description: "HF Jobs hardware flavor"
        required: false
        default: a10g-small
      timeout:
        description: "Job timeout (e.g. 3h)"
        required: false
        default: 3h
  push:
    branches: [main]
    paths:
      - "scripts/hf_jobs_train_eegnet.py"
      - "scripts/publish_benchmarks.py"
      - ".github/workflows/hf-jobs-train-eegnet.yml"
  workflow_run:
    workflows: [mes-train-pipeline]
    types: [completed]

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_USERNAME: ${{ secrets.HF_USERNAME }}
      HF_DATASET_REPO: ${{ secrets.HF_USERNAME }}/mes-eeg-processed
      HF_MODEL_REPO: ${{ secrets.HF_USERNAME }}/mes-models
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Hugging Face CLI
        run: pip install --upgrade 'huggingface_hub[cli]>=0.26'
      - name: Preflight (fail fast)
        run: python scripts/preflight.py --stage hf-jobs-eegnet

  train:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 210
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_USERNAME: ${{ secrets.HF_USERNAME }}
      HF_DATASET_REPO: ${{ secrets.HF_USERNAME }}/mes-eeg-processed
      HF_MODEL_REPO: ${{ secrets.HF_USERNAME }}/mes-models
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Hugging Face CLI
        run: pip install --upgrade 'huggingface_hub[cli]>=0.26'

      - name: Submit EEGNet training job (HF Jobs)
        run: |
          set -euo pipefail
          FLAVOR="${{ github.event.inputs.flavor || 'a10g-small' }}"
          TIMEOUT="${{ github.event.inputs.timeout || '3h' }}"
          echo "Submitting HF Job: flavor=$FLAVOR timeout=$TIMEOUT"
          hf jobs uv run scripts/hf_jobs_train_eegnet.py \
            --flavor "$FLAVOR" \
            --timeout "$TIMEOUT" \
            --secrets HF_TOKEN \
            -e HF_DATASET_REPO="$HF_DATASET_REPO" \
            -e HF_MODEL_REPO="$HF_MODEL_REPO" \
            -e HF_USERNAME="$HF_USERNAME" \
            -l mes=eegnet \
            -l source=hf-jobs

      - name: Verify EEGNet ONNX on Hub
        run: |
          python <<'PY'
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          files = api.list_repo_files(os.environ["HF_MODEL_REPO"], repo_type="model")
          need = {"eegnet_right_hand.onnx", "riemannian_lr_right_hand.onnx"}
          missing = need - set(files)
          if missing:
              raise SystemExit(f"Missing on Hub: {sorted(missing)}")
          print("OK:", sorted(need))
          PY

      - name: Publish training benchmarks to Hub
        run: |
          pip install -q 'huggingface_hub[cli]>=0.26'
          python scripts/publish_benchmarks.py

      - name: Done
        run: |
          echo "::notice::EEGNet model published to https://huggingface.co/${HF_MODEL_REPO}"
